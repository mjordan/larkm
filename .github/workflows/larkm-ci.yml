name: larkm-ci

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      -
        steps:
          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip


          - name: Run Pytest
            run: pytest
